name: Release

on:
    push:
        tags:
            - "[0-9]+.[0-9]+.[0-9]+"

permissions:
    contents: write
    id-token: write
    attestations: write
    artifact-metadata: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22.x
                  cache: "npm"

            - run: npm ci

            - run: npm run build

            - name: Verify release metadata
              run: |
                  node -e "const fs=require('fs'); const tag=process.env.GITHUB_REF_NAME; const manifest=JSON.parse(fs.readFileSync('manifest.json','utf8')); const versions=JSON.parse(fs.readFileSync('versions.json','utf8')); if (manifest.version !== tag) throw new Error(`manifest.json version ${manifest.version} does not match tag ${tag}`); if (versions[tag] !== manifest.minAppVersion) throw new Error(`versions.json missing ${tag} -> ${manifest.minAppVersion}`);"
                  test -f main.js
                  test -f manifest.json
                  test -f styles.css

            - name: Generate artifact attestations
              uses: actions/attest@v4
              with:
                  subject-path: |
                      main.js
                      manifest.json
                      styles.css

            - name: Create or update GitHub release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file CHANGELOG.md
                  gh release upload "$GITHUB_REF_NAME" main.js manifest.json styles.css --clobber
